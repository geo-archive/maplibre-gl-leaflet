<html>
<head>
	<title>Leaflet debug page</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

  <!-- Maplibre GL -->
  <link href="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.css" rel='stylesheet' />
  <script src="https://unpkg.com/maplibre-gl@5.0.1/dist/maplibre-gl.js"></script>
  <script src="../leaflet-maplibre-gl.js"></script>
  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>

	<div id="map"></div>

	<script>
    var map = new L.Map('map');
		var gl = L.maplibreGL({
      style: 'https://demotiles.maplibre.org/style.json'
    }).addTo(map);

		var	bounds = new L.LatLngBounds(
			new L.LatLng(48.064, 5.496),
			new L.LatLng(45.346, 11.128));
		map.fitBounds(bounds);
		var overlay = new L.ImageOverlay("data/CH_relief_overlay.jpg", bounds, {
			opacity: 0.8,
			interactive: true,
			attribution: '&copy; <a href="https://www.swisstopo.ch/">Swisstopo</a>'
		});
		map.addLayer(overlay);
		overlay.on('dblclick',function (e) {
			console.log('Double click on image.');
		});
	</script>
</body>
</html>
